<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ridge. — Wavy Family Size</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-0: #0c0d10;
      --bg-1: #1a1b1f;
      --ink: #f4f3ef;
      --ink-dim: rgba(244, 243, 239, 0.62);
      --ink-faint: rgba(244, 243, 239, 0.38);
      --accent: #8b8f97;
      --accent-soft: #3a3c40;
      --ring-speed: 1100ms;
      --spin-duration: 2600ms;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-0);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 62% 50%, color-mix(in srgb, var(--accent) 38%, transparent) 0%, transparent 32%),
        radial-gradient(circle at 62% 50%, transparent 30%, color-mix(in srgb, var(--accent) 14%, transparent) 31%, transparent 46%),
        radial-gradient(circle at 62% 50%, transparent 47%, color-mix(in srgb, var(--accent) 10%, transparent) 48%, transparent 62%),
        radial-gradient(circle at 62% 50%, transparent 64%, color-mix(in srgb, var(--accent) 7%, transparent) 65%, transparent 80%),
        linear-gradient(160deg, var(--bg-1), var(--bg-0) 70%);
      transition: background-color var(--spin-duration) ease;
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 62% 50%, transparent 0 13%, color-mix(in srgb, var(--ink) 4%, transparent) 13.4% 13.8%, transparent 14.2%),
        radial-gradient(circle at 62% 50%, transparent 0 22%, color-mix(in srgb, var(--ink) 4%, transparent) 22.4% 22.8%, transparent 23.2%),
        radial-gradient(circle at 62% 50%, transparent 0 38%, color-mix(in srgb, var(--ink) 3%, transparent) 38.4% 38.8%, transparent 39.2%),
        radial-gradient(circle at 62% 50%, transparent 0 56%, color-mix(in srgb, var(--ink) 3%, transparent) 56.4% 56.8%, transparent 57.2%);
      pointer-events: none;
    }

    /* ---------- NAV ---------- */
    .navwrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 40px 0;
      position: relative;
      z-index: 5;
      gap: 24px;
    }

    .logo {
      position: absolute;
      left: 40px;
      top: 30px;
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      letter-spacing: 0.5px;
      font-style: italic;
      color: var(--ink);
    }

    nav {
      background: rgba(244, 243, 239, 0.96);
      border-radius: 999px;
      padding: 6px;
      display: flex;
      gap: 4px;
    }

    nav a {
      position: relative;
      text-decoration: none;
      color: #1c1c1e;
      font-weight: 600;
      font-size: 14.5px;
      padding: 10px 18px;
      border-radius: 999px;
      display: inline-block;
      white-space: nowrap;
    }

    nav a.active {
      background: #111113;
      color: #fff;
    }

    nav a:not(.active) .underline {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 6px;
      height: 2px;
      background: #111113;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 320ms cubic-bezier(.22, .61, .36, 1);
    }

    nav a:not(.active):hover .underline {
      transform: scaleX(1);
    }

    nav a:not(.active):hover {
      color: #000;
    }

    .nav-icons {
      position: absolute;
      right: 40px;
      top: 28px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      cursor: pointer;
      background: rgba(244, 243, 239, 0.08);
      transition: background 200ms ease;
    }

    .icon-btn:hover {
      background: rgba(244, 243, 239, 0.16);
    }

    .cart-wrap {
      position: relative;
    }

    .cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #e2402f;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---------- MAIN LAYOUT ---------- */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1.15fr 140px;
      align-items: center;
      gap: 24px;
      padding: 20px 60px 40px;
      position: relative;
      z-index: 2;
    }

    .copy {
      max-width: 480px;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 12.5px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 18px;
      display: block;
      transition: color 600ms ease;
    }

    h1 {
      font-family: 'Anton', sans-serif;
      font-weight: 400;
      font-size: clamp(40px, 4.6vw, 64px);
      line-height: 0.98;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 26px;
    }

    .price {
      font-family: 'Space Mono', monospace;
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--ink);
    }

    .desc {
      color: var(--ink-dim);
      font-size: 15.5px;
      line-height: 1.6;
      margin-bottom: 34px;
      min-height: 50px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 2px;
      background: rgba(244, 243, 239, 0.06);
      border: 1px solid rgba(244, 243, 239, 0.14);
      border-radius: 999px;
      padding: 6px 8px;
    }

    .qty button {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(244, 243, 239, 0.1);
      color: var(--ink);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms ease;
    }

    .qty button:hover {
      background: rgba(244, 243, 239, 0.2);
    }

    .qty span {
      width: 34px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 15px;
    }

    .order-btn {
      background: var(--ink);
      color: #111;
      border: none;
      padding: 14px 32px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14.5px;
      cursor: pointer;
      transition: transform 180ms ease, background 600ms ease;
    }

    .order-btn:hover {
      transform: translateY(-2px);
    }

/* ---------- HERO BAG ---------- */





/* Hero Container */
.bag-stage{
    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    height:100%;
}


/* Rotating Object */
.bag-inner{
    width:min(34vw,420px);
    transform-style:preserve-3d;
    transform-origin:center center;
    will-change:transform;
}

/* Image */
.bag-inner img{
    width:100%;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
    filter:drop-shadow(0 30px 60px rgba(0,0,0,.35));
}

/* Spin Animation */
@keyframes flavorSpin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(1080deg);
    }

}

/* Active Spin */
.bag-inner.spinning{
    animation:flavorSpin 1.5s cubic-bezier(.3,0,0.5,1) forwards;
}
.bag-stage {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    perspective: 1800px;
}

#heroImg{
    width:100%;
    display:block;
    filter:drop-shadow(0 30px 60px rgba(0,0,0,.35));
    transition:opacity .35s ease;
}

.bag-inner{
    width:min(34vw,420px);
   
    transform-origin:center center;
    will-change:transform;
}

/* Idle floating */

@keyframes heroIdle{

    0%{
        transform:
        translateY(0px)
        rotateZ(0deg);
    }

    25%{
        transform:
        translateY(-8px)
        rotateZ(1deg);
    }

    50%{
        transform:
        translateY(0px)
        rotateZ(0deg);
    }

    75%{
        transform:
        translateY(8px)
        rotateZ(-1deg);
    }

    100%{
        transform:
        translateY(0px)
        rotateZ(0deg);
    }

}



    /* ---------- SIDE RAIL ---------- */
    .rail {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
    }

    .thumb {
      background: transparent;
      border: none;
      width: auto;
      height: auto;
      cursor: pointer;
      position: relative;
      transition: all .35s ease;
    }

    .thumb img {
      width: 90px;
      display: block;
      transition: all .35s ease;
      filter: brightness(.55);
    }

    .thumb .glow {
      display: none;
    }

    /* Fade every image when hovering rail */

    .rail:hover .thumb img {
      opacity: .4;
      filter: brightness(.6);
      transform: scale(.92);
    }


    .thumb:hover {

      z-index: 100;

    }

    /* Highlight hovered image */

    .rail .thumb:hover img {
      opacity: 1;
      filter: brightness(1.25) drop-shadow(0 0 18px rgba(255, 255, 255, .35));
      transform: scale(1.18);
    }

    /* Active image */

    .thumb.active img {
      opacity: 1;
      filter: brightness(1.2);
      transform: scale(1.12);
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 16px 24px 32px;
        text-align: center;
      }

      .copy {
        max-width: 100%;
        order: 2;
      }

      .bag-stage {
        order: 1;
      }

      .rail {
        order: 3;
        flex-direction: row;
      }

      .navwrap {
        padding-top: 90px;
      }

      .logo {
        top: 18px;
        left: 24px;
      }

      .nav-icons {
        top: 18px;
        right: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bag-inner.spinning {
        animation: none;
      }
    }
  </style>
</head>

          accent: "#e0a627",
          eyebrow: "Cheddar",
          headline: "Sharp Cheddar,<br>Golden Ridge",
          desc: "Real cheddar dust clings to every wave for a rich, melty finish.",
          price: "$5.00"
        }
      };

      const stage = document.getElementById('stage');
      const bagInner = document.getElementById('bagInner');
      const heroImg = document.getElementById('heroImg');
      const eyebrow = document.getElementById('eyebrow');
      const headline = document.getElementById('headline');
      const desc = document.getElementById('desc');
      const price = document.getElementById('price');
      const thumbs = document.querySelectorAll('.thumb');

      let current = 'silver';
      let isAnimating = false;

      function applyContent(key) {
        const f = FLAVORS[key];
        eyebrow.textContent = f.eyebrow;
        headline.innerHTML = f.headline;
        desc.textContent = f.desc;
        price.textContent = f.price;
        stage.style.setProperty('--accent', f.accent);
      }

      function selectFlavor(key){

    if(isAnimating || key === current) return;

    isAnimating = true;

    thumbs.forEach(t =>
        t.classList.toggle("active", t.dataset.flavor === key)
    );

    bagInner.classList.remove("spinning");
    void bagInner.offsetWidth;
    bagInner.classList.add("spinning");

    // Change image after first full rotation
    setTimeout(() => {

        heroImg.src = FLAVORS[key].img;
        applyContent(key);

    },400);

    // Stop after second rotation
    setTimeout(() => {

        bagInner.classList.remove("spinning");

        current = key;
        isAnimating = false;

    },800);

}

      thumbs.forEach(t => {
        t.addEventListener('click', () => selectFlavor(t.dataset.flavor));
      });

      // initial accent
      stage.style.setProperty('--accent', FLAVORS[current].accent);

      // quantity stepper
      let qty = 4;
      const qtyVal = document.getElementById('qtyVal');
      document.getElementById('qtyMinus').addEventListener('click', () => {
        qty = Math.max(1, qty - 1);
        qtyVal.textContent = String(qty).padStart(2, '0');
      });
      document.getElementById('qtyPlus').addEventListener('click', () => {
        qty = Math.min(99, qty + 1);
        qtyVal.textContent = String(qty).padStart(2, '0');
      });

      // nav active state on click (no page nav, just UI state)
      document.querySelectorAll('#primaryNav a').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('#primaryNav a').forEach(x => x.classList.remove('active'));
          a.classList.add('active');
        });
      });
    })();
